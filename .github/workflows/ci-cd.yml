name: Multi-Tier App Automation

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8==7.0.0 pytest==8.3.5 ansible-core==2.16.2 ansible-lint==6.22.0

      - name: Start Flask app
        run: |
          nohup python app.py &
          sleep 5

      - name: Lint Python
        run: flake8 python/

      - name: Test Python
        run: pytest tests/

      - name: Lint Ansible
        run: ansible-lint ansible/playbooks/

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      - name: Run Ansible Playbooks
        run: |
          ansible-playbook -i ansible/inventory ansible/playbooks/frontend.yml
          ansible-playbook -i ansible/inventory ansible/playbooks/backend.yml
          ansible-playbook -i ansible/inventory ansible/playbooks/database.yml

      - name: Security Check
        run: python python/security_check.py

      - name: Validate App
        run: python python/validate_app.py

      - name: Monitoring Check
        run: python monitoring/alert.py
