jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8==7.0.0 pytest==8.3.5

      - name: Start Flask app
        run: |
          nohup python app.py &
          sleep 5

      - name: Lint Python
        run: flake8 python/

      - name: Test Python
        run: pytest tests/

      - name: Lint Ansible
        run: ansible-lint ansible/playbooks/
