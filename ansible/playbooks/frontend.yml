- name: Frontend setup
  hosts: localhost
  connection: local
  tasks:
    - name: Copy custom index.html
      ansible.builtin.command: docker cp {{ playbook_dir }}/../../files/index.html frontend:/usr/share/nginx/html/index.html
      changed_when: false
